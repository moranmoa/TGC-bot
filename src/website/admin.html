<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGC-BOT | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .dashboard-gradient {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        }
        .command-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .command-card:hover {
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="antialiased dashboard-gradient min-h-screen">
    
    <header class="w-full z-50 p-6 border-b border-slate-800 bg-[#0f172a]">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="text-xl font-bold text-white tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300">
                    TGC Admin
                </div>
                <span class="px-3 py-1 bg-green-500/20 text-green-400 text-xs rounded-full border border-green-500/30 flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span> Connected
                </span>
            </div>
            <a href="/" class="text-slate-400 hover:text-white transition duration-300">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </a>
        </div>
    </header>

    <main class="container mx-auto px-6 py-10">
        
        <div class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-white mb-2">Bot Commands</h1>
                <p class="text-slate-400">Manage and view all registered slash commands for TGC-BOT.</p>
            </div>
            <div class="text-slate-500 text-sm" id="command-count">
                Loading commands...
            </div>
        </div>

        <div id="commands-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div id="loader" class="col-span-full flex justify-center py-12">
                <i class="fas fa-circle-notch fa-spin text-3xl text-blue-500"></i>
            </div>
        </div>
        
    </main>

    <script>
        // 1. חילוץ ושמירת ה-Token מה-URL
        const urlParams = new URLSearchParams(window.location.search);
        let token = urlParams.get('token');
        
        if (token) {
            localStorage.setItem('discord_token', token);
            // מנקים את ה-URL כדי שייראה אסתטי ללא הטוקן החשוף
            window.history.replaceState({}, document.title, "/admin.html");
        } else {
            token = localStorage.getItem('discord_token');
        }

        // אם אין טוקן בכלל, נחזיר אותו למסך הבית להתחברות
        if (!token) {
            window.location.href = '/';
        }

        // 2. שליפת השרתים המורשים של האדמין והצגתם
        async function loadAdminDashboard() {
            try {
                const response = await fetch('/api/user/guilds', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Unauthorized');
                const guilds = await response.json();
                
                const container = document.getElementById('commands-container'); // או קונטיינר ייעודי לשרתים
                const loader = document.getElementById('loader');
                if(loader) loader.remove();

                // במקום להציג פקודות ישר, נציג לו קודם כל את השרתים שלו לבחירה!
                document.getElementById('command-count').innerHTML = `<i class="fas fa-server mr-1"></i> Select a Server to Manage`;
                container.innerHTML = ''; // מנקים

                guilds.forEach(guild => {
                    const card = document.createElement('div');
                    card.className = 'command-card p-6 rounded-xl flex items-center space-x-4 cursor-pointer';
                    
                    const iconUrl = guild.icon || 'https://via.placeholder.com/150/1e293b/ffffff?text=Discord';
                    
                    card.innerHTML = `
                        <img src="${iconUrl}" class="w-12 h-12 rounded-full border border-slate-700 shadow-md">
                        <div class="flex-grow pl-3">
                            <h2 class="text-xl font-bold text-white">${guild.name}</h2>
                            <p class="text-xs text-blue-400">Click to manage bot configuration</p>
                        </div>
                    `;
                    
                    // בלחיצה על שרת, תוכל לטעון את הפקודות או ההגדרות הספציפיות שלו
                    card.onclick = () => loadServerSettings(guild.id, guild.name);
                    
                    container.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                localStorage.removeItem('discord_token');
                window.location.href = '/';
            }
        }

        function loadServerSettings(guildId, guildName) {
            alert(`Loading configuration for server: ${guildName} (ID: ${guildId})`);
            // כאן בעתיד תבצע fetch לפקודות או למידע ה-JSON הספציפי של אותו שרת
        }

        document.addEventListener('DOMContentLoaded', loadAdminDashboard);
    </script>
</body>
</html>
