<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGC-BOT | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .dashboard-gradient {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        }
        .command-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .command-card:hover {
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="antialiased dashboard-gradient min-h-screen">
    
    <header class="w-full z-50 p-6 border-b border-slate-800 bg-[#0f172a]">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="text-xl font-bold text-white tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300">
                    TGC Admin
                </div>
                <span class="px-3 py-1 bg-green-500/20 text-green-400 text-xs rounded-full border border-green-500/30 flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span> Connected
                </span>
            </div>
            <a href="/" class="text-slate-400 hover:text-white transition duration-300">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </a>
        </div>
    </header>

    <main class="container mx-auto px-6 py-10">
        
        <div class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-white mb-2">Bot Commands</h1>
                <p class="text-slate-400">Manage and view all registered slash commands for TGC-BOT.</p>
            </div>
            <div class="text-slate-500 text-sm" id="command-count">
                Loading commands...
            </div>
        </div>

        <div id="commands-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div id="loader" class="col-span-full flex justify-center py-12">
                <i class="fas fa-circle-notch fa-spin text-3xl text-blue-500"></i>
            </div>
        </div>
        
    </main>

    <script>
        // 1. חילוץ ושמירת ה-Token מה-URL
        const urlParams = new URLSearchParams(window.location.search);
        console.log('AAA inside ADMIN AA :');
        let token = urlParams.get('token');
        console.log('AA Token:', token);
        if (token) {
            console.log('AA 001' );

            localStorage.setItem('discord_token', token);
            // מנקים את ה-URL כדי שייראה אסתטי ללא הטוקן החשוף
            window.history.replaceState({}, document.title, "/admin.html");
        } else {
             console.log('AA 002' );
            token = localStorage.getItem('discord_token');
        }

        // אם אין טוקן בכלל, נחזיר אותו למסך הבית להתחברות
        if (!token) {
            window.location.href = '/';
        }
        console.log('AA 003' );

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            let token = urlParams.get('token');
            console.log('AA 004' );

            // אם הגענו עכשיו מה-Redirect עם טוקן ב-URL, נשמור אותו וננקה את הכתובת
            if (token) {
                localStorage.setItem('discord_token', token);
                window.history.replaceState({}, document.title, '/admin.html');
            } else {
                token = localStorage.getItem('discord_token');
            }

            // אם אין טוקן בכלל, נחזיר לעמוד הראשי
            if (!token) {
                window.location.href = '/';
                return;
            }
            console.log('AA 005' );

            await loadAdminDashboard(token);
        });

        async function loadAdminDashboard(token) {
            try {
                console.log('Fetching dashboard data with token...');
                const response = await fetch(`/api/dashboard-data?token=${token}`);
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    // הוספת הדפסת התוכן של השגיאה כדי להבין מה השרת באמת מחזיר
                    const errorText = await response.text();
                    console.error('Server error response:', errorText);
                    throw new Error(`Unauthorized: ${errorText}`);
                }

                const data = await response.json();
                console.log('Data received:', data);

                renderServers(data.guilds);
                renderCommands(data.commands);

            } catch (error) {
                console.error('Failed to load dashboard:', error);
                // השארתי את ה-Redirect רק כדי למנוע לופ אינסופי של טעינה
                // אם אתה רוצה לחקור, תגיב את השורה למטה
                // window.location.href = '/'; 
            }
}

        function renderServers(guilds) {
            const container = document.getElementById('servers-container'); // ודא שיש אלמנט כזה ב-HTML שלך
            if (!container) return;
            container.innerHTML = '';

            if (guilds.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-center col-span-full">לא נמצאו שרתים מורשים עם הבוט.</p>';
                return;
            }
            console.log('AA 008' );
            guilds.forEach(guild => {
                const card = document.createElement('div');
                card.className = 'command-card p-4 rounded-xl flex items-center space-x-4 cursor-pointer hover:bg-slate-800 transition';
                
                const iconUrl = guild.icon 
                    ? `https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png` 
                    : 'https://via.placeholder.com/150/1e293b/ffffff?text=Discord';
                
                card.innerHTML = `
                    <img src="${iconUrl}" class="w-12 h-12 rounded-full border border-slate-700 shadow-md">
                    <div class="flex-grow pl-3 text-right">
                        <h2 class="text-xl font-bold text-white">${guild.name}</h2>
                        <p class="text-xs text-blue-400">לחץ לניהול הגדרות השרת</p>
                    </div>
                `;
                
                card.onclick = () => loadServerSettings(guild.id, guild.name);
                container.appendChild(card);
            });
        }

        function renderCommands(commands) {
            const container = document.getElementById('commands-container'); // ודא שיש אלמנט כזה ב-HTML להצגת הפקודות
            if (!container) return;
            container.innerHTML = '';

            if (commands.length === 0) {
                container.innerHTML = '<p class="text-slate-400">לא נמצאו פקודות זמינות בבוט.</p>';
                return;
            }
            console.log('AA 009' );
            commands.forEach(cmd => {
                const card = document.createElement('div');
                card.className = 'command-card p-4 rounded-xl border border-slate-700 mb-3 bg-slate-800/40 text-right';
                card.innerHTML = `
                    <div class="flex justify-between items-center flex-row-reverse">
                        <span class="text-sm font-mono px-2 py-1 bg-blue-500/20 text-blue-400 rounded-md">/${cmd.name}</span>
                    </div>
                    <p class="text-sm text-slate-300 mt-2">${cmd.description || 'אין תיאור לפקודה זו'}</p>
                `;
                container.appendChild(card);
            });
        }

        function loadServerSettings(guildId, guildName) {
            alert(`טוען הגדרות עבור השרת: ${guildName} (${guildId})`);
        }

        document.addEventListener('DOMContentLoaded', loadAdminDashboard);
    </script>
</body>
</html>
