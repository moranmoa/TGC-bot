<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGC-BOT | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .dashboard-gradient {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        }
        .command-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .command-card:hover {
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="antialiased dashboard-gradient min-h-screen">
    
    <header class="w-full z-50 p-6 border-b border-slate-800 bg-[#0f172a]">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="text-xl font-bold text-white tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300">
                    TGC Admin
                </div>
                <span class="px-3 py-1 bg-green-500/20 text-green-400 text-xs rounded-full border border-green-500/30 flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span> Connected
                </span>
            </div>
            <a href="/" class="text-slate-400 hover:text-white transition duration-300">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </a>
        </div>
    </header>

    <main class="container mx-auto px-6 py-10">
        
        <div class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-white mb-2">Bot Commands</h1>
                <p class="text-slate-400">Manage and view all registered slash commands for TGC-BOT.</p>
            </div>
            <div class="text-slate-500 text-sm" id="command-count">
                Loading commands...
            </div>
        </div>

        <div id="commands-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div id="loader" class="col-span-full flex justify-center py-12">
                <i class="fas fa-circle-notch fa-spin text-3xl text-blue-500"></i>
            </div>
        </div>
        
    </main>

    <script>
        // פונקציה לשליפת הפקודות מהשרת והצגתן במסך
        async function fetchCommands() {
            try {
                const response = await fetch('/api/commands');
                
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                
                const commands = await response.json();
                const container = document.getElementById('commands-container');
                const countDisplay = document.getElementById('command-count');
                const loader = document.getElementById('loader');
                
                // הסרת כפתור הטעינה
                loader.remove();
                
                // עדכון מספר הפקודות
                countDisplay.innerHTML = `<i class="fas fa-terminal mr-1"></i> ${commands.length} Commands Loaded`;
                
                if (commands.length === 0) {
                    container.innerHTML = '<p class="col-span-full text-center text-slate-500 py-8">No commands found.</p>';
                    return;
                }

                // רינדור הפקודות
                commands.forEach(cmd => {
                    const card = document.createElement('div');
                    card.className = 'command-card p-6 rounded-xl flex flex-col';
                    
                    // בניית תוכן הכרטיס
                    let optionsHtml = '';
                    if (cmd.options && cmd.options.length > 0) {
                        optionsHtml = `
                            <div class="mt-4 pt-4 border-t border-slate-700/50">
                                <p class="text-xs text-slate-500 font-semibold mb-2 uppercase tracking-wider">Parameters</p>
                                <div class="flex flex-wrap gap-2">
                                    ${cmd.options.map(opt => `<span class="text-xs px-2 py-1 bg-slate-800 rounded text-slate-300 border border-slate-700">${opt.name}${opt.required ? '<span class="text-red-400 ml-1">*</span>' : ''}</span>`).join('')}
                                </div>
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        <div class="flex items-start justify-between mb-3">
                            <h2 class="text-xl font-bold text-blue-400 flex items-center">
                                <span class="text-slate-500 mr-1">/</span>${cmd.name}
                            </h2>
                            <span class="text-xs px-2 py-1 bg-blue-500/10 text-blue-300 rounded border border-blue-500/20">Slash Command</span>
                        </div>
                        <p class="text-slate-300 text-sm flex-grow">${cmd.description}</p>
                        ${optionsHtml}
                    `;
                    
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error fetching commands:', error);
                const container = document.getElementById('commands-container');
                container.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <div class="text-red-400 text-5xl mb-4"><i class="fas fa-exclamation-triangle"></i></div>
                        <h3 class="text-xl font-semibold text-white mb-2">Failed to load commands</h3>
                        <p class="text-slate-500">Please make sure the API server is running and accessible.</p>
                    </div>
                `;
            }
        }

        // הפעלת הפונקציה בטעינת העמוד
        document.addEventListener('DOMContentLoaded', fetchCommands);
    </script>
</body>
</html>
