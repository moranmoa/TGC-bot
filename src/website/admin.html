<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGC-BOT | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .dashboard-gradient {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        }
        .command-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .command-card:hover {
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased">

    <div class="flex h-screen overflow-hidden text-left" dir="ltr">
        
        <aside class="w-80 bg-slate-800 border-r border-slate-700 flex flex-col p-4 z-10 shadow-2xl">
            <div class="mb-6 pb-4 border-b border-slate-700 flex justify-between items-center">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-cogs text-blue-500"></i>
                    TGC-BOT Panel
                </h2>
            </div>

            <div class="mb-6">
                <label for="server-select" class="block text-sm font-semibold text-slate-400 mb-2">Select a server to manage</label>
                <div class="flex items-center gap-2">
                    <select id="server-select" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl p-3 text-white font-medium focus:ring-2 focus:ring-blue-500 focus:border-blue-500 cursor-pointer transition">
                        <option value="" disabled selected>-- Loading servers... --</option>
                    </select>
                    <button title="Refresh" onclick="window.location.reload()" class="p-3 bg-slate-900 border border-slate-700 rounded-xl text-white hover:bg-slate-800 transition">
                        <i class="fas fa-sync"></i>
                    </button>
                </div>
-------
            </div>
            
            <div id="sidebar-commands-section" class="flex-1 overflow-y-auto hidden border-t border-slate-700/50 pt-4">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Available Commands</h3>
                <ul id="sidebar-commands-list" class="space-y-1">
                </ul>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8 bg-slate-900" id="main-content">
            <div id="placeholder-content" class="h-full flex flex-col justify-center items-center text-slate-500">
                <i class="fas fa-th-large text-6xl mb-4 text-slate-700"></i>
                <p class="text-xl font-medium">Please select a server from the sidebar to begin</p>
            </div>
        </main>
    </div>

    <script type="module">
        // מגדיר אילו פקודות יוצגו בסיידבר ומה השם/אייקון שלהן
        const ADMIN_COMMANDS = {
            'spamprotection': { displayName: 'Spam Shield', icon: 'fa-shield-alt' },
            'kick': { displayName: 'Kick Member', icon: 'fa-user-times' },
            'birthday-config': { displayName: 'Birthday Config', icon: 'fa-birthday-cake' },
            'gen-room': { displayName: 'Voice Generator', icon: 'fa-microphone' },
            'goblin': { displayName: 'Goblin Event', icon: 'fa-ghost' },
            'guild_list': { displayName: 'Guild List', icon: 'fa-users' }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        if (urlToken) {
            localStorage.setItem('discord_token', urlToken);
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        const token = localStorage.getItem('discord_token');
        if (!token) window.location.href = '/';

        let globalGuilds = [];
        let globalCommands = [];
        let selectedGuildId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAdminDashboard(token);
        });

        async function loadAdminDashboard(authToken) {
            try {
                const response = await fetch(`/api/dashboard-data`, { headers: { 'Authorization': authToken } });
                if (!response.ok) throw new Error('Failed to load');
                const data = await response.json();
                
                globalGuilds = data.guilds || [];
                // מסנן רק את הפקודות שמוגדרות במילון ה-ADMIN_COMMANDS
                globalCommands = (data.commands || []).filter(cmd => ADMIN_COMMANDS[cmd.name]);
                globalCommands.unshift({
                    name: 'guild_list',
                    description: 'Manage and view all bot guilds'
                });

                renderServersDropdown(globalGuilds);
            } catch (error) {
                console.error(error);
            }
        }

        function renderServersDropdown(guilds) {
            const select = document.getElementById('server-select');
            select.innerHTML = '<option value="" disabled selected>-- Select a server --</option>';
            guilds.forEach(guild => {
                const option = document.createElement('option');
                option.value = guild.id;
                option.textContent = guild.name;
                select.appendChild(option);
            });

            select.addEventListener('change', (e) => {
                selectedGuildId = e.target.value;
                handleServerSelection(selectedGuildId);
            });
        }

        function handleServerSelection(guildId) {
            document.getElementById('sidebar-commands-section').classList.remove('hidden');
            renderCommandsSidebar(globalCommands);
            document.getElementById('main-content').innerHTML = `
                <div class="h-full flex flex-col justify-center items-center text-slate-500">
                    <i class="fas fa-terminal text-6xl mb-4 text-slate-700"></i>
                    <p class="text-xl font-medium">Select a command from the sidebar</p>
                </div>
            `;
        }

        function renderCommandsSidebar(commands) {
            const listContainer = document.getElementById('sidebar-commands-list');
            listContainer.innerHTML = '';

            commands.forEach(cmd => {
                const adminConfig = ADMIN_COMMANDS[cmd.name];
                const li = document.createElement('li');
                li.innerHTML = `
                    <button class="w-full text-left px-4 py-2.5 rounded-xl text-slate-300 hover:bg-slate-700/50 hover:text-white transition flex items-center justify-between font-medium text-sm">
                        <div class="flex items-center gap-2">
                            <i class="fas ${adminConfig.icon} text-slate-400 group-hover:text-white"></i>
                            <span>${adminConfig.displayName}</span>
                        </div>
                    </button>
                `;

                const btn = li.querySelector('button');
                btn.addEventListener('click', (e) => {
                    listContainer.querySelectorAll('button').forEach(b => {
                        b.classList.remove('bg-blue-600', 'text-white', 'shadow-lg');
                        b.classList.add('text-slate-300', 'hover:bg-slate-700/50');
                    });
                    e.currentTarget.classList.add('bg-blue-600', 'text-white', 'shadow-lg');
                    e.currentTarget.classList.remove('hover:bg-slate-700/50');

                    // טוען את קובץ ה-JS הספציפי של הפקודה
                    loadCommandLogic(cmd);
                });

                listContainer.appendChild(li);
            });
        }

        async function loadCommandLogic(command) {
            const mainContent = document.getElementById('main-content');
            
            try {
                // טעינה דינמית של הקובץ מתיקיית website/commands
                const module = await import(`./commands/${command.name}.js`);
                if (module.render) {
                    await module.render(mainContent, command, selectedGuildId);
                }
            } catch (error) {
                console.error(`Failed to load command logic for ${command.name}:`, error);
                mainContent.innerHTML = `
                    <div class="max-w-2xl bg-slate-800 border border-slate-700 rounded-2xl p-12 shadow-xl text-center mx-auto mt-10">
                        <i class="fas fa-tools text-5xl text-amber-500 mb-4"></i>
                        <h2 class="text-2xl font-bold text-white mb-2">${ADMIN_COMMANDS[command.name]?.displayName || command.name}</h2>
                        <p class="text-slate-400 mb-6">The interface for configuring this command is currently under development.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
